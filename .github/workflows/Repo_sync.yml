name: Repo_sync

on:
  repository_dispatch:
  workflow_dispatch:
  schedule:
    - cron: 30 20 * * *
  
jobs:
  New-Update-Files:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@main
      with:
        token: ${{ secrets.GH_TOKEN }}

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo timedatectl set-timezone "Asia/Shanghai"
        pwd
        #临时备份本仓库readme
        mv README.md back.md
        #wget -O ./long https://raw.githubusercontent.com/kaikai8191/openit/main/long
        svn export https://github.com/ophub/amlogic-s9xxx-armbian/trunk/ ./ --force
        sed -i 's/custom_name="-ophub"/custom_name=""/g' ./recompile
        sed -i 's/default: "-ophub"/default: ""/g' ./action.yml
        #备份源仓库readme
        mv README.md READMEBACK.md
        #恢复本仓库readme
        mv back.md README.md
        
    - name: Commit
      run: |
        git config --local user.name "GitHub Actions"
        git config --local user.email "actions@github.com"
        git add .
        git commit -m"action:`date`"
        git pull --rebase
        
    - name: Push changes
      uses: ad-m/github-push-action@master
      with:
        github_token: ${{ secrets.GH_TOKEN }}        
   
    - name: Delete workflow runs
      uses: Mattraks/delete-workflow-runs@v2
      with:
        retain_days: 0
        keep_minimum_runs: 3
